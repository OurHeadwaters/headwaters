openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: episodes
    description: The Survival Podcast episodes (RSS-fed, latest ~400)
  - name: feed
    description: Channel-level podcast information
  - name: library
    description: Unified library across audio, articles, and video
  - name: series
    description: Recurring episode series
  - name: zones
    description: Permaculture zone 0–5 content organization
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: track-progress
    description: Per-user learning track progress (requires authentication).
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get podcast channel information
      responses:
        "200":
          description: Feed info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
  /episodes:
    get:
      operationId: listEpisodes
      tags: [episodes]
      summary: List episodes
      description: Paginated, newest-first podcast episodes from the live RSS feed. For the full archive (3,800+ episodes including written posts and videos), use /library/search.
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: category, in: query, required: false, schema: { type: string } }
        - name: tags
          in: query
          required: false
          description: "One or more topic tags to filter by (sent as tags[] array)"
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sort
          in: query
          required: false
          description: "Sort order: newest (default), oldest, or popular (foundational/evergreen episodes first by episode number ascending, nulls last)"
          schema:
            type: string
            enum: [newest, oldest, popular]
            default: newest
      responses:
        "200":
          description: Episodes page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodePage"
  /episodes/this-day:
    get:
      operationId: getThisDayEpisodes
      tags: [episodes]
      summary: Episodes published on this calendar date across all years
      description: Returns all episodes whose publish date matches the given month and day (defaults to today). Each entry includes a historyTimestamp (seconds) if a "This Day in History" segment was detected in the show notes.
      parameters:
        - { name: month, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 12 } }
        - { name: day, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 31 } }
      responses:
        "200":
          description: Episodes matching this calendar date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThisDayEpisode"
  /episodes/featured:
    get:
      operationId: getFeaturedEpisodes
      tags: [episodes]
      summary: Get featured episodes
      responses:
        "200":
          description: Featured episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"
  /episodes/stats:
    get:
      operationId: getEpisodeStats
      tags: [episodes]
      summary: Aggregate episode stats
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeStats"
  /episodes/{slug}:
    get:
      operationId: getEpisode
      tags: [episodes]
      summary: Get a single episode by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Episode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /categories:
    get:
      operationId: listCategories
      tags: [episodes]
      summary: List categories with counts (from RSS feed)
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"
  /library/search:
    get:
      operationId: searchLibrary
      tags: [library]
      summary: Search the unified library
      description: Full-text search across audio episodes, written articles, and YouTube videos. Filter by kind, tag, or category.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: kind, in: query, required: false, description: "Comma-separated subset of audio,article,video", schema: { type: string } }
        - { name: tag, in: query, required: false, schema: { type: string } }
        - { name: category, in: query, required: false, schema: { type: string } }
        - { name: series, in: query, required: false, description: "Slug of a series from the SERIES_REGISTRY (e.g. unloose-the-goose)", schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [newest, oldest, relevance], default: newest } }
      responses:
        "200":
          description: Library search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryPage"
  /library/stats:
    get:
      operationId: getLibraryStats
      tags: [library]
      summary: Library counts and sync status
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"
  /library/tags:
    get:
      operationId: listLibraryTags
      tags: [library]
      summary: Top tags across the library
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 500, default: 100 } }
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"
  /library/items/{slug}:
    get:
      operationId: getLibraryItem
      tags: [library]
      summary: Fetch a single library item by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Library item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryItemDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /series:
    get:
      operationId: listSeries
      tags: [series]
      summary: List all episode series with episode counts
      parameters:
        - name: orderBy
          in: query
          required: false
          schema:
            type: string
            enum: [episodeCount:desc, episodeCount:asc, featured]
          description: "Sort order: episodeCount:desc (default), episodeCount:asc, featured (featured entries first, then by episode count)"
      responses:
        "200":
          description: Series list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesSummary"
  /series/{slug}/episodes:
    get:
      operationId: getSeriesEpisodes
      tags: [series]
      summary: Get episodes for a series
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 500, default: 20 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        "200":
          description: Series episodes page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesEpisodePage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List all permaculture zones with item counts and embedded series
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneSummary"
  /zones/{slug}/episodes:
    get:
      operationId: getZoneEpisodes
      tags: [zones]
      summary: Get episodes for a zone, ordered by zone-tag relevance
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: excludeSeries, in: query, required: false, schema: { type: boolean, default: true } }
      responses:
        "200":
          description: Zone episodes page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneEpisodePage"
        "404":
          description: Zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /library/refresh:
    post:
      operationId: refreshLibrary
      tags: [library]
      summary: Trigger a library refresh
      description: Re-syncs all sources from upstream. Throttled to once every 6 hours unless force=true.
      parameters:
        - { name: force, in: query, required: false, schema: { type: boolean, default: false } }
      responses:
        "200":
          description: Refresh summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSummary"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /track-progress/{slug}:
    get:
      tags: [track-progress]
      operationId: getTrackProgress
      summary: Get the current user's progress for a learning track
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Progress loaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackProgressResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [track-progress]
      operationId: updateTrackProgress
      summary: Mark or unmark an episode as done for a learning track
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackProgressUpdate'
      responses:
        '200':
          description: Progress updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    ApiError:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Feed:
      type: object
      required: [title, description, link, host, artworkUrl, totalEpisodes]
      properties:
        title: { type: string }
        description: { type: string }
        link: { type: string }
        host: { type: string }
        artworkUrl: { type: string }
        copyright: { type: ["string", "null"] }
        language: { type: ["string", "null"] }
        totalEpisodes: { type: integer }
        latestPubDate: { type: ["string", "null"] }
        tipUrl: { type: ["string", "null"] }
    Episode:
      type: object
      required: [slug, guid, episodeNumber, title, link, pubDate, summary, categories]
      properties:
        slug: { type: string }
        guid: { type: string }
        episodeNumber: { type: ["integer", "null"] }
        title: { type: string }
        link: { type: string }
        pubDate: { type: string }
        summary: { type: string }
        durationSeconds: { type: ["integer", "null"] }
        audioUrl: { type: ["string", "null"] }
        audioType: { type: ["string", "null"] }
        artworkUrl: { type: ["string", "null"] }
        categories:
          type: array
          items: { type: string }
    ThisDayEpisode:
      allOf:
        - $ref: "#/components/schemas/Episode"
        - type: object
          properties:
            historyTimestamp:
              type: ["integer", "null"]
              description: "Seconds into the episode where the 'This Day in History' segment begins, if detected in the show notes"
    EpisodeDetail:
      allOf:
        - $ref: "#/components/schemas/Episode"
        - type: object
          required: [descriptionHtml]
          properties:
            descriptionHtml: { type: string }
            seriesSlug: { type: ["string", "null"] }
            positionInSeries: { type: ["integer", "null"] }
    EpisodePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Episode" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    CategoryCount:
      type: object
      required: [name, count]
      properties:
        name: { type: string }
        count: { type: integer }
        description: { type: string }
        autoDescriptionStale: { type: boolean }
        descriptionUpdatedAt: { type: ["string", "null"] }
    MonthBucket:
      type: object
      required: [month, count]
      properties:
        month: { type: string }
        count: { type: integer }
    EpisodeStats:
      type: object
      required: [totalEpisodes, topCategories, publishHistogram]
      properties:
        totalEpisodes: { type: integer }
        latestPubDate: { type: ["string", "null"] }
        latestEpisodeNumber: { type: ["integer", "null"] }
        averageDurationSeconds: { type: ["integer", "null"] }
        episodesLast30Days: { type: integer }
        topCategories:
          type: array
          items: { $ref: "#/components/schemas/CategoryCount" }
        publishHistogram:
          type: array
          items: { $ref: "#/components/schemas/MonthBucket" }
    LibraryItem:
      type: object
      required:
        - id
        - source
        - kind
        - slug
        - title
        - link
        - summary
        - publishedAt
        - categories
        - tags
      properties:
        id: { type: integer }
        source:
          type: string
          description: "wordpress | youtube"
        kind:
          type: string
          description: "audio | article | video"
        slug: { type: string }
        title: { type: string }
        link: { type: string }
        summary: { type: string }
        publishedAt: { type: string }
        episodeNumber: { type: ["integer", "null"] }
        durationSeconds: { type: ["integer", "null"] }
        audioUrl: { type: ["string", "null"] }
        audioType: { type: ["string", "null"] }
        videoUrl: { type: ["string", "null"] }
        videoId: { type: ["string", "null"] }
        artworkUrl: { type: ["string", "null"] }
        categories:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
    LibraryItemDetail:
      allOf:
        - $ref: "#/components/schemas/LibraryItem"
        - type: object
          required: [bodyHtml]
          properties:
            bodyHtml: { type: string }
            related:
              type: array
              items: { $ref: "#/components/schemas/LibraryItem" }
    LibraryPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/LibraryItem" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    KindCount:
      type: object
      required: [kind, count]
      properties:
        kind: { type: string }
        count: { type: integer }
    SyncStatus:
      type: object
      required: [source, status]
      properties:
        source: { type: string }
        status: { type: string }
        finishedAt: { type: ["string", "null"] }
        itemsSeen: { type: ["integer", "null"] }
        itemsUpserted: { type: ["integer", "null"] }
        errorMessage: { type: ["string", "null"] }
    LibraryStats:
      type: object
      required: [totalItems, byKind, topCategories, topTags, sync]
      properties:
        totalItems: { type: integer }
        byKind:
          type: array
          items: { $ref: "#/components/schemas/KindCount" }
        latestPublishedAt: { type: ["string", "null"] }
        earliestPublishedAt: { type: ["string", "null"] }
        topCategories:
          type: array
          items: { $ref: "#/components/schemas/CategoryCount" }
        topTags:
          type: array
          items: { $ref: "#/components/schemas/CategoryCount" }
        sync:
          type: array
          items: { $ref: "#/components/schemas/SyncStatus" }
    RefreshSourceResult:
      type: object
      required: [status, itemsSeen, itemsUpserted]
      properties:
        status: { type: string }
        itemsSeen: { type: integer }
        itemsUpserted: { type: integer }
        error: { type: ["string", "null"] }
    RefreshSummary:
      type: object
      required: [wordpress, youtube]
      properties:
        wordpress: { $ref: "#/components/schemas/RefreshSourceResult" }
        youtube: { $ref: "#/components/schemas/RefreshSourceResult" }
    ZoneSeriesSummary:
      type: object
      required: [slug, title, description, iconEmoji, episodeCount]
      properties:
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        iconEmoji: { type: string }
        episodeCount: { type: integer }
        sampleArtworkUrl: { type: ["string", "null"] }
    ZoneSummary:
      type: object
      required: [number, slug, name, subtitle, description, philosophy, color, itemCount, sampleArtwork, series]
      properties:
        number: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtitle: { type: string }
        description: { type: string }
        philosophy: { type: string }
        color: { type: string }
        itemCount: { type: integer }
        sampleArtwork:
          type: array
          items: { type: string }
        series:
          type: array
          items: { $ref: "#/components/schemas/ZoneSeriesSummary" }
    ZoneInfo:
      type: object
      required: [number, slug, name, subtitle, description, philosophy, color]
      properties:
        number: { type: integer }
        slug: { type: string }
        name: { type: string }
        subtitle: { type: string }
        description: { type: string }
        philosophy: { type: string }
        color: { type: string }
    ZoneLibraryItem:
      type: object
      required: [id, source, kind, slug, title, link, publishedAt, categories, tags]
      properties:
        id: { type: integer }
        source: { type: string }
        kind: { type: string }
        slug: { type: string }
        title: { type: string }
        link: { type: string }
        summary: { type: ["string", "null"] }
        publishedAt: { type: string, format: date-time }
        episodeNumber: { type: ["integer", "null"] }
        durationSeconds: { type: ["integer", "null"] }
        audioUrl: { type: ["string", "null"] }
        audioType: { type: ["string", "null"] }
        videoUrl: { type: ["string", "null"] }
        videoId: { type: ["string", "null"] }
        artworkUrl: { type: ["string", "null"] }
        categories:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        zoneScore: { type: integer }
    ZoneEpisodePage:
      type: object
      required: [zone, items, total, limit, offset]
      properties:
        zone:
          $ref: "#/components/schemas/ZoneInfo"
        items:
          type: array
          items: { $ref: "#/components/schemas/ZoneLibraryItem" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    SeriesSummary:
      type: object
      required: [slug, title, description, iconEmoji, episodeCount, featured]
      properties:
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        iconEmoji: { type: string }
        episodeCount: { type: integer }
        featured: { type: boolean }
        latestPubDate: { type: ["string", "null"] }
        sampleArtworkUrl: { type: ["string", "null"] }
    SeriesEpisodePage:
      type: object
      required: [series, items, total, limit, offset]
      properties:
        series:
          $ref: "#/components/schemas/SeriesSummary"
        items:
          type: array
          items: { $ref: "#/components/schemas/Episode" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
