openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: episodes
    description: The Survival Podcast episodes (fetched from the public RSS feed)
  - name: feed
    description: Channel-level podcast information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get podcast channel information
      description: Returns the podcast's title, description, artwork, host, and aggregate stats from the RSS feed.
      responses:
        "200":
          description: Feed info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
  /episodes:
    get:
      operationId: listEpisodes
      tags: [episodes]
      summary: List episodes
      description: Returns paginated episodes, newest first. Supports full-text search and category filtering.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: q
          in: query
          required: false
          description: Full-text search across title, description and categories.
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Filter by exact category label.
          schema:
            type: string
      responses:
        "200":
          description: Episodes page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodePage"
  /episodes/featured:
    get:
      operationId: getFeaturedEpisodes
      tags: [episodes]
      summary: Get featured episodes
      description: Returns the most recent episodes hand-picked for the hero rail (5 items).
      responses:
        "200":
          description: Featured episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"
  /episodes/stats:
    get:
      operationId: getEpisodeStats
      tags: [episodes]
      summary: Aggregate episode stats
      description: Totals, latest publish date, top categories, and a 12-month publish histogram.
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeStats"
  /episodes/{slug}:
    get:
      operationId: getEpisode
      tags: [episodes]
      summary: Get a single episode by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Episode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /categories:
    get:
      operationId: listCategories
      tags: [episodes]
      summary: List categories with counts
      description: Returns every category seen in the feed with the number of episodes that reference it, newest first.
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Feed:
      type: object
      required: [title, description, link, host, artworkUrl, totalEpisodes]
      properties:
        title:
          type: string
        description:
          type: string
        link:
          type: string
        host:
          type: string
        artworkUrl:
          type: string
        copyright:
          type: ["string", "null"]
        language:
          type: ["string", "null"]
        totalEpisodes:
          type: integer
        latestPubDate:
          type: ["string", "null"]
          description: ISO-8601 timestamp of the newest episode.
        tipUrl:
          type: ["string", "null"]
          description: URL where listeners can tip the host.
    Episode:
      type: object
      required:
        - slug
        - guid
        - episodeNumber
        - title
        - link
        - pubDate
        - summary
        - categories
      properties:
        slug:
          type: string
          description: URL-safe slug derived from the episode link.
        guid:
          type: string
        episodeNumber:
          type: ["integer", "null"]
          description: Parsed episode number (e.g. 3848) when present in the title.
        title:
          type: string
          description: Episode title with the episode-number suffix stripped.
        link:
          type: string
          description: Canonical link to the episode page on thesurvivalpodcast.com.
        pubDate:
          type: string
          description: ISO-8601 publish date.
        summary:
          type: string
          description: Short, plain-text summary (HTML stripped, ~280 chars).
        durationSeconds:
          type: ["integer", "null"]
        audioUrl:
          type: ["string", "null"]
        audioType:
          type: ["string", "null"]
        artworkUrl:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
    EpisodeDetail:
      allOf:
        - $ref: "#/components/schemas/Episode"
        - type: object
          required: [descriptionHtml]
          properties:
            descriptionHtml:
              type: string
              description: Full episode description as sanitized HTML.
    EpisodePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Episode"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    CategoryCount:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
    MonthBucket:
      type: object
      required: [month, count]
      properties:
        month:
          type: string
          description: Year-month label, e.g. "2026-05".
        count:
          type: integer
    EpisodeStats:
      type: object
      required:
        - totalEpisodes
        - topCategories
        - publishHistogram
      properties:
        totalEpisodes:
          type: integer
        latestPubDate:
          type: ["string", "null"]
        latestEpisodeNumber:
          type: ["integer", "null"]
        averageDurationSeconds:
          type: ["integer", "null"]
        episodesLast30Days:
          type: integer
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        publishHistogram:
          type: array
          items:
            $ref: "#/components/schemas/MonthBucket"
