kind = "web"
previewPath = "/crypto-castle/"
title = "The Castle — Crypto Learning Hub"
version = "1.0.0"
id = "artifacts/crypto-castle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/crypto-castle/" ]
localPort = 21500

[services.development]
run = "pnpm --filter @workspace/crypto-castle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-castle", "run", "build" ]
publicDir = "artifacts/crypto-castle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21500"
BASE_PATH = "/crypto-castle/"
