kind = "web"
previewPath = "/"
title = "The Survival Podcast — Redesign"
version = "1.0.0"
id = "artifacts/survival-podcast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21015

[services.development]
run = "pnpm --filter @workspace/survival-podcast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/survival-podcast", "run", "build" ]
publicDir = "artifacts/survival-podcast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21015"
BASE_PATH = "/"
