kind = "web"
previewPath = "/headwaters/"
title = "Headwaters — Practitioner Intake Tool"
version = "1.0.0"
id = "artifacts/headwaters"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/headwaters/" ]
localPort = 21294

[services.development]
run = "pnpm --filter @workspace/headwaters run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/headwaters", "run", "build" ]
publicDir = "artifacts/headwaters/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21294"
BASE_PATH = "/headwaters/"
