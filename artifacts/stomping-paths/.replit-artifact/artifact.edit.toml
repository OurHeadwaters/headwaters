kind = "web"
previewPath = "/"
title = "The Stomping Paths"
version = "1.0.0"
id = "artifacts/stomping-paths"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21015

[services.development]
run = "pnpm --filter @workspace/stomping-paths run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stomping-paths", "run", "build" ]
publicDir = "artifacts/stomping-paths/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21015"
BASE_PATH = "/"
